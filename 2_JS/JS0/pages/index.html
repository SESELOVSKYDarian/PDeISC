<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrays JS0 - Node sin Express</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles/light.css">
  <link rel="stylesheet" href="/styles/dark.css">
  <style>
    body { background: var(--bg); color: var(--text); }
    .card { background: var(--surface); border-color: var(--border); }
    .muted { color: var(--muted); }
    .badge-soft { background: color-mix(in srgb, var(--accent) 22%, transparent); color: var(--text); }
    .sticky-tools { position: sticky; top: 0; z-index: 2; background: var(--bg); }
    #toTop { position: fixed; right: 20px; bottom: 20px; display: none; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h1 class="h3 m-0">Trabajo Integrador Arrays - Node.js puro</h1>
      <button id="themeBtn" class="btn btn-outline-primary">Cambiar tema</button>
    </div>

    <section class="sticky-tools py-2 mb-3 border-bottom" style="border-color: var(--border) !important;">
      <div class="row g-2">
        <div class="col-12 col-md-6">
          <label for="searchInput" class="form-label">Buscar por m?todo o texto</label>
          <input id="searchInput" class="form-control" type="text" placeholder="Ej: map, reduce, secreto" />
        </div>
        <div class="col-12 col-md-4">
          <label for="categoryFilter" class="form-label">Filtrar por categor?a</label>
          <select id="categoryFilter" class="form-select">
            <option value="todos">Todas</option>
            <option value="mutador">Mutador</option>
            <option value="no mutador">No mutador</option>
            <option value="busqueda">Busqueda</option>
            <option value="iteracion">Iteracion</option>
            <option value="transformacion">Transformacion</option>
            <option value="especial">Especial</option>
          </select>
        </div>
      </div>
      <p id="feedback" class="muted mt-2 mb-0"></p>
    </section>

    <section id="cards" class="row g-3"></section>
  </main>

  <button id="toTop" class="btn btn-primary">Volver arriba</button>

  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
