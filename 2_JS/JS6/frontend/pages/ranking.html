<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Ahorcado — Ranking</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/navigation.css">
  <link rel="stylesheet" href="../styles/buttons.css">
  <link rel="stylesheet" href="../styles/cards.css">
  <link rel="stylesheet" href="../styles/forms.css">
  <link rel="stylesheet" href="../styles/table.css">
  <link rel="stylesheet" href="../styles/modal.css">
  <link rel="stylesheet" href="../styles/toast.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/accessibility.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <link rel="stylesheet" href="../styles/light.css">
  <link rel="stylesheet" href="../styles/dark.css">
  <link rel="stylesheet" href="../styles/polish.css">
</head>
<body>
  <a href="#contenido-principal" class="saltar-contenido">Saltar al contenido principal</a>

  <!-- navegación -->
  <header class="navbar">
    <div class="contenedor navbar__contenido">
      <a href="/index.html" class="navbar__marca">
        <i data-lucide="drama"></i> El Ahorcado
      </a>

      <button type="button" class="navbar__boton-menu" data-boton-menu aria-label="Abrir menú" aria-expanded="false">
        <i data-lucide="menu"></i>
      </button>

      <nav class="navbar__enlaces" data-enlaces-nav aria-label="Navegación principal">
        <a href="/index.html" class="navbar__enlace">Jugar</a>
        <a href="/pages/ranking.html" class="navbar__enlace activo">Ranking</a>
        <a href="/pages/admin.html" class="navbar__enlace">Administrador</a>
        <button type="button" class="boton boton--icono" data-boton-tema aria-label="Cambiar tema">
          <span class="icono-mask icono-mask--moon" aria-hidden="true"></span>
        </button>
      </nav>
    </div>
  </header>

  <main id="contenido-principal" class="contenedor">
    <div class="fila-entre">
      <h1><i data-lucide="trophy"></i> Ranking de jugadores</h1>
      <button type="button" class="boton boton--primario" data-descargar-pdf-ranking>
        <i data-lucide="file-down"></i> Descargar PDF
      </button>
    </div>

    <div class="tarjeta" style="margin-top: var(--espaciado-md);">
      <div class="fila-entre" style="margin-bottom: var(--espaciado-md);">
        <div class="campo" style="margin-bottom:0; min-width:220px;">
          <label class="campo__etiqueta" for="buscador-ranking">Buscar jugador</label>
          <input type="search" id="buscador-ranking" class="campo__control" data-buscador-ranking placeholder="Nombre del jugador...">
        </div>
      </div>

      <div class="tabla-envoltorio">
        <table class="tabla">
          <thead>
            <tr>
              <th data-ordenar-por="nombre" aria-sort="none">Nombre</th>
              <th data-ordenar-por="puntos" aria-sort="descending">Puntos</th>
              <th data-ordenar-por="tiempo" aria-sort="none">Tiempo</th>
              <th data-ordenar-por="fecha" aria-sort="none">Fecha</th>
            </tr>
          </thead>
          <tbody data-cuerpo-tabla-ranking>
            <tr><td colspan="4">Cargando ranking...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="paginacion" data-paginacion-ranking></div>
    </div>
  </main>

  <button type="button" class="boton--icono boton-volver-arriba" data-volver-arriba aria-label="Volver arriba">
    <i data-lucide="arrow-up"></i>
  </button>

  <script src="node_modules/lucide/dist/umd/lucide.min.js"></script>
  <script>window.lucide && window.lucide.createIcons();</script>
  <script type="module" src="../scripts/ranking.js"></script>
</body>
</html>
