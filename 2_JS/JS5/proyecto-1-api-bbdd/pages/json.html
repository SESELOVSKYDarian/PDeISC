<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto 1 - JSON real</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link id="tema-css" rel="stylesheet" href="/styles/light.css" />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <header class="hero py-5">
      <div class="container">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <span class="hero-etiqueta mb-3">Proyecto 1 · Vista JSON</span>
            <h1 class="display-4 fw-bold mb-3">JSON real desde la API</h1>
            <p class="hero-descripcion mb-3">
              Esta pantalla consume internamente <strong>POST /api/alumnos/listar</strong> y muestra la respuesta exacta dentro de un bloque <code>&lt;pre&gt;</code>.
            </p>
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-principal btn-con-icono" id="btn-recargar-json" type="button">
                <i data-lucide="refresh-cw"></i>
                <span>Recargar JSON</span>
              </button>
              <a class="btn btn-secundario btn-con-icono" href="/">
                <i data-lucide="arrow-left"></i>
                <span>Volver al formulario</span>
              </a>
            </div>
          </div>
          <div class="col-lg-4">
            <article class="panel-resumen p-4">
              <div class="resumen-cabecera">
                <div class="resumen-icono" aria-hidden="true">
                  <i data-lucide="file-json"></i>
                </div>
                <div>
                  <p class="resumen-etiqueta mb-1">Salida</p>
                  <h2 class="h4 mb-0">Respuesta de la API</h2>
                </div>
              </div>
              <div class="resumen-detalles">
                <div>
                  <span>Formato</span>
                  <strong>JSON real</strong>
                </div>
                <div>
                  <span>Origen</span>
                  <strong>MySQL a través de Express</strong>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>
    </header>

    <main class="container my-5">
      <section class="card-listado p-4">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
          <div>
            <h2 class="h4 mb-2">Respuesta cruda</h2>
            <p id="mensaje-json" class="mensaje-listado mb-0"></p>
          </div>
        </div>

        <pre id="salida-json" class="visor-json mb-0"></pre>
      </section>
    </main>

    <aside class="contenedor-toasts" id="contenedor-toasts" aria-live="polite" aria-atomic="false"></aside>

    <button id="btn-tema" class="boton-flotante boton-tema" type="button" aria-label="Cambiar tema">
      <i data-lucide="moon"></i>
    </button>
    <button id="btn-subir" class="boton-flotante boton-subir" type="button" aria-label="Subir arriba">
      <i data-lucide="arrow-up"></i>
    </button>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/scripts/main.js"></script>
  </body>
</html>
