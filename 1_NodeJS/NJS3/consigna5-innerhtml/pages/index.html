<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consigna 5 | InnerHTML</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/public/styles/styles.css" />
  </head>
  <body class="app-shell">
    <main class="container py-4 py-lg-5">
      <section class="hero card border-0 shadow-sm mb-4">
        <div class="card-body p-4 p-lg-5">
          <span class="badge text-bg-dark mb-3">Bootstrap + InnerHTML</span>
          <h1 class="display-6 mb-3">Consigna 5</h1>
          <p class="lead mb-0">
            Insercion de distintos objetos HTML por medio de
            <code>innerHTML</code>.
          </p>
        </div>
      </section>

      <section class="row g-3 mb-4">
        <div class="col-12 col-md-6 col-xl">
          <button class="insert-btn btn btn-primary w-100" data-type="title" type="button">
            <span class="d-block small opacity-75 fw-normal">click</span>
            Título
          </button>
        </div>
        <div class="col-12 col-md-6 col-xl">
          <button class="insert-btn btn btn-info w-100" data-type="paragraph" type="button">
            <span class="d-block small opacity-75 fw-normal">click</span>
            Párrafo
          </button>
        </div>
        <div class="col-12 col-md-6 col-xl">
          <button class="insert-btn btn btn-success w-100" data-type="list" type="button">
            <span class="d-block small opacity-75 fw-normal">click</span>
            Lista
          </button>
        </div>
        <div class="col-12 col-md-6 col-xl">
          <button class="insert-btn btn btn-secondary w-100" data-type="card" type="button">
            <span class="d-block small opacity-75 fw-normal">click</span>
            Tarjeta
          </button>
        </div>
        <div class="col-12 col-md-6 col-xl">
          <button id="clear-btn" class="btn btn-outline-danger w-100" type="button">
            <span class="d-block small fw-normal">dblclick</span>
            Limpiar
          </button>
        </div>
      </section>

      <section class="row g-4">
        <div class="col-12 col-lg-8">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header fw-semibold bg-white border-bottom">Área de renderizado</div>
            <div id="output" class="card-body output"></div>
          </div>
        </div>
        <aside class="col-12 col-lg-4">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header fw-semibold bg-white border-bottom">Estado</div>
            <div class="card-body">
              <p id="feedback" class="alert alert-info mb-0 small">
                Hacé click en un botón para insertar contenido HTML.
              </p>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="/public/scripts/main.js"></script>
  </body>
</html>
