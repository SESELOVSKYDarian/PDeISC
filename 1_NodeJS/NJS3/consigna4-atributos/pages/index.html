<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consigna 4 | Nodos y atributos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/public/styles/styles.css" />
  </head>
  <body class="server-shell">
    <main class="container py-4 py-lg-5">
      <section class="hero card border-0 shadow-sm mb-4">
        <div class="card-body p-4 p-lg-5">
          <span class="badge text-bg-warning mb-3">Bootstrap + Atributos</span>
          <h1 class="display-6 mb-3">Consigna 4</h1>
          <p class="lead mb-0">
            Creacion de 5 nodos diferentes y modificacion individual de atributos
            con un boton para cada uno.
          </p>
        </div>
      </section>

      <section class="card border-0 shadow-sm mb-4">
        <div class="card-header fw-semibold bg-white border-bottom">Crear nodos</div>
        <div class="card-body d-flex flex-wrap gap-2">
          <button id="create-node-1-btn" class="btn btn-warning px-3 py-2" type="button">Crear Enlace &lt;a&gt;</button>
          <button id="create-node-2-btn" class="btn btn-warning px-3 py-2" type="button">Crear Imagen &lt;img&gt;</button>
          <button id="create-node-3-btn" class="btn btn-warning px-3 py-2" type="button">Crear Input &lt;input&gt;</button>
          <button id="create-node-4-btn" class="btn btn-warning px-3 py-2" type="button">Crear Botón &lt;button&gt;</button>
          <button id="create-node-5-btn" class="btn btn-warning px-3 py-2" type="button">Crear Caja &lt;div&gt;</button>
        </div>
      </section>

      <section class="card border-0 shadow-sm mb-4">
        <div class="card-header fw-semibold bg-white border-bottom">Editar atributos</div>
        <div class="card-body d-flex flex-wrap gap-2">
          <button id="edit-node-1-btn" class="btn btn-outline-warning px-3 py-2" type="button" disabled>Editar Enlace</button>
          <button id="edit-node-2-btn" class="btn btn-outline-warning px-3 py-2" type="button" disabled>Editar Imagen</button>
          <button id="edit-node-3-btn" class="btn btn-outline-warning px-3 py-2" type="button" disabled>Editar Input</button>
          <button id="edit-node-4-btn" class="btn btn-outline-warning px-3 py-2" type="button" disabled>Editar Botón</button>
          <button id="edit-node-5-btn" class="btn btn-outline-warning px-3 py-2" type="button" disabled>Editar Caja</button>
        </div>
      </section>

      <section class="row g-4">
        <div class="col-12 col-lg-5">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header fw-semibold bg-white border-bottom">Nodos generados</div>
            <div class="card-body">
              <div id="nodes-container" class="links-container"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-7">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header fw-semibold bg-white border-bottom">Registro de cambios</div>
            <div class="card-body p-0">
              <ul id="changes-log" class="list-group list-group-flush">
                <li class="list-group-item text-muted small">Sin cambios todavia.</li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="/public/scripts/main.js"></script>
  </body>
</html>
